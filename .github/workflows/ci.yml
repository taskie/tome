name: CI

on:
  push:
    branches: [master, "feature/**"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Build / Fmt / Clippy / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: >
          cargo clippy
          -p tome-core -p tome-db -p tome-store -p tome-server -p tome-cli
          -p aether -p aether-cli -p treblo -p treblo-cli
          --no-deps -- -D warnings

      - name: Build
        run: >
          cargo build
          -p tome-core -p tome-db -p tome-store -p tome-server -p tome-cli
          -p aether -p aether-cli -p treblo -p treblo-cli

      - name: Test
        run: >
          cargo test
          -p tome-core -p tome-db -p tome-store -p tome-server -p tome-cli
          -p aether -p aether-cli -p treblo -p treblo-cli

      # ── tome-web (Next.js) ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: tome-web/.nvmrc
          cache: npm
          cache-dependency-path: tome-web/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: tome-web

      - name: Lint (ESLint + Prettier)
        run: npm run lint
        working-directory: tome-web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: tome-web

      - name: Build
        run: npm run build
        working-directory: tome-web
